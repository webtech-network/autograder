name: Validate Documentation

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'web/schemas/**'
      - 'web/api/**'
      - 'scripts/validate_docs.py'

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate documentation
        run: python scripts/validate_docs.py
